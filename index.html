<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerShare Pro | Secure Transfer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>PowerShare <span class="pro">PRO</span></h2>
            <div id="safety-badge">SECURE MODE</div>
        </div>

        <div class="battery-display">
            <div class="battery-outer">
                <div id="charge-fill" class="charge-fill"></div>
            </div>
            <h1 id="level-txt">--%</h1>
            <p id="msg-txt">Ready to Connect</p>
        </div>

        <div class="dashboard">
            <div class="control-group">
                <label>Safety Stop Limit: <span id="limit-display">25</span>%</label>
                <input type="range" id="safety-slider" min="15" max="40" value="25">
            </div>

            <div class="realtime-data">
                <div class="data-box">
                    <span>Temp</span>
                    <strong id="temp-val">Normal</strong>
                </div>
                <div class="data-box">
                    <span>Protocol</span>
                    <strong id="protocol">Safe-Link</strong>
                </div>
            </div>

            <button id="mainBtn">INITIATE SECURE TRANSFER</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
